<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escola Modelo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Escola Modelo</h1>
  <p>Educação de qualidade para o futuro</p>
</header>

<nav>
  <a onclick="mostrar('home')">Início</a>
  <a onclick="mostrar('galeria')">Galeria</a>
  <a onclick="mostrar('contato')">Contato</a>
  <a onclick="mostrar('alunos')">Alunos</a>
</nav>

<section id="home" class="active">
  <h2>Bem-vindo!</h2>
  <p>Nossa escola oferece ensino de qualidade com professores dedicados.</p>
</section>

<section id="galeria">
  <h2>Galeria</h2>
  <div class="cards">
    <div class="card"><img src="escola1.jpg"></div>
    <div class="card"><img src="escola2.jpg"></div>
    <div class="card"><img src="escola3.jpg"></div>
    <div class="card"><img src="escola4.jpg"></div>
  </div>
</section>

<section id="contato">
  <h2>Contato</h2>
  <input type="text" id="nome" placeholder="Seu nome">
  <input type="email" id="email" placeholder="Seu email">
  <button onclick="enviar()">Enviar</button>
  <p id="msg"></p>
</section>

<section id="alunos">
  <h2>Lista de Alunos</h2>
  <input type="text" id="novoAluno" placeholder="Nome do aluno">
  <button onclick="addAluno()">Adicionar</button>
  <ul id="lista"></ul>
</section>

<footer>
  <p>© 2026 Escola Modelo</p>
</footer>

<script src="script.js"></script>
</body>
</html>
